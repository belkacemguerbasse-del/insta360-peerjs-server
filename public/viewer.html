<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Insta360 Live 360°</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0a0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
  body { display: flex; flex-direction: column; }

  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; height: 44px; flex-shrink: 0;
    background: rgba(0,0,0,0.55); border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }
  .logo { font-size: 13px; font-weight: 600; }
  .logo span { color: #5dcaa5; }
  .right { display: flex; align-items: center; gap: 8px; }

  .badge {
    display: none; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600;
  }
  .badge.on { display: flex; }
  .badge .dot { width: 7px; height: 7px; border-radius: 50%; }
  .badge.live { background: rgba(226,75,74,0.2); border: 0.5px solid rgba(226,75,74,0.4); color: #f09595; }
  .badge.live .dot { background: #e24b4a; animation: pulse 1.2s infinite; }
  .badge.connecting { background: rgba(255,184,77,0.15); color: #ffb84d; border: 0.5px solid rgba(255,184,77,0.3); }
  .badge.connecting .dot { background: #ffb84d; animation: pulse 1.2s infinite; }
  .badge.tracking { background: rgba(93,202,165,0.15); color: #5dcaa5; border: 0.5px solid rgba(93,202,165,0.3); }
  .badge.tracking .dot { background: #5dcaa5; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .bb-btn.active {
    background: rgba(93,202,165,0.3);
    border-color: rgba(93,202,165,0.6);
    color: #fff;
  }
  .bb-btn.active:hover { background: rgba(93,202,165,0.4); }
  .bb-btn.loading { opacity: 0.6; cursor: wait; }

  #main { flex: 1; position: relative; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; cursor: grab; }
  canvas.grabbing { cursor: grabbing; }

  #splash {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; background: #0a0a0f; padding: 20px;
  }
  #splash h2 { font-size: 17px; font-weight: 500; }
  #splash p { font-size: 12px; color: rgba(255,255,255,0.5); text-align: center; max-width: 320px; line-height: 1.6; }
  #splash input {
    background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 7px; color: #fff; font-size: 13px; padding: 8px 12px;
    width: 240px; text-align: center; outline: none;
    font-family: 'SF Mono', Menlo, monospace;
  }
  #splash button {
    background: #1d9e75; border: none; border-radius: 8px;
    color: #fff; font-size: 13px; font-weight: 500;
    padding: 9px 24px; cursor: pointer;
  }
  #splash button:hover { background: #0f6e56; }
  #splash button:disabled { opacity: 0.4; cursor: default; }
  #err { display:none; color: #f09595; font-size: 11px;
    background: rgba(226,75,74,0.12); border: 0.5px solid rgba(226,75,74,0.3);
    padding: 6px 12px; border-radius: 6px; max-width: 320px; text-align: center; }
  #err.on { display: block; }

  #bottombar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 10px 14px; display: none; gap: 10px; align-items: center;
    background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
  }
  #bottombar.on { display: flex; }
  .bb-btn {
    background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.18);
    border-radius: 7px; color: #fff; font-size: 12px; padding: 6px 12px; cursor: pointer;
  }
  .bb-btn:hover { background: rgba(255,255,255,0.2); }

  #fov-group { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  #fov-group label { font-size: 11px; color: rgba(255,255,255,0.5); }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100px; height: 3px; background: rgba(255,255,255,0.2);
    border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%; background: #5dcaa5; cursor: pointer;
  }
  #fov-val { font-size: 11px; color: rgba(255,255,255,0.6); min-width: 28px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">Insta360 <span>360°</span> Live</div>
  <div class="right">
    <div class="badge connecting" id="badge-conn"><span class="dot"></span>CONNEXION</div>
    <div class="badge live" id="badge-live"><span class="dot"></span>LIVE</div>
    <div class="badge tracking" id="badge-track"><span class="dot"></span><span id="track-count">0</span> personne<span id="track-plural">s</span></div>
  </div>
</div>

<div id="main">
  <canvas id="c"></canvas>

  <div id="splash">
    <h2>Rejoindre un live 360°</h2>
    <p>Entre l'ID de session partagé par le diffuseur :</p>
    <input id="id-input" placeholder="x5-xxxxxx" />
    <button id="btn-join">Rejoindre</button>
    <div id="err"></div>
  </div>

  <div id="bottombar">
    <button class="bb-btn" id="btn-center">Centrer</button>
    <button class="bb-btn" id="btn-track" title="Suivi automatique des personnes">Suivi auto</button>
    <button class="bb-btn" id="btn-vr" title="Mode VR (casque)" style="display:none">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;fill:none;stroke:currentColor;stroke-width:2"><rect x="2" y="7" width="20" height="10" rx="2"/><circle cx="7.5" cy="12" r="1.5"/><circle cx="16.5" cy="12" r="1.5"/></svg>VR
    </button>
    <button class="bb-btn" id="btn-fs">Plein écran</button>
    <div id="fov-group">
      <label>Zoom</label>
      <input type="range" id="fov" min="30" max="110" value="75" step="1">
      <span id="fov-val">75°</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
'use strict'
;(function () {
  const canvas    = document.getElementById('c')
  const splash    = document.getElementById('splash')
  const errEl     = document.getElementById('err')
  const idInput   = document.getElementById('id-input')
  const btnJoin   = document.getElementById('btn-join')
  const badgeConn = document.getElementById('badge-conn')
  const badgeLive = document.getElementById('badge-live')
  const badgeTrack= document.getElementById('badge-track')
  const trackCount= document.getElementById('track-count')
  const trackPlural=document.getElementById('track-plural')
  const bottombar = document.getElementById('bottombar')
  const btnCenter = document.getElementById('btn-center')
  const btnTrack  = document.getElementById('btn-track')
  const btnVR     = document.getElementById('btn-vr')
  const btnFs     = document.getElementById('btn-fs')
  const fovRange  = document.getElementById('fov')
  const fovValEl  = document.getElementById('fov-val')

  let renderer, scene, camera, sphere, videoTex, videoEl
  let lon = 0, lat = 0
  let isDragging = false, prevX = 0, prevY = 0
  let fov = 75
  let peer = null, call = null
  let streamReceived = false

  // ── Tracking auto-framing ───────────────────────────────────────────────
  let trackingEnabled  = false
  let detector         = null
  let detectorLoading  = false
  let lastDetectTime   = 0
  const DETECT_INTERVAL_MS = 100             // 10 FPS de détection (vidéo reste à 60 FPS)
  let targetLon = 0, targetLat = 0
  let hasTarget = false                       // false tant qu'aucune détection valide
  let userOverrideUntil = 0                   // timestamp ms : suivi en pause jusqu'à cette date
  const OVERRIDE_DURATION_MS = 3000           // 3s après un drag, on reprend le suivi
  const LERP_FACTOR = 0.06                    // vitesse de rapprochement (0..1) — plus haut = plus rapide

  // ICE servers : STUN Google + TURN public openrelay (relais NAT)
  const ICE_SERVERS = [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'turn:openrelay.metered.ca:80',  username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
  ]

  const urlId = new URLSearchParams(location.search).get('id')
  if (urlId) idInput.value = urlId

  function showError (msg) {
    errEl.textContent = msg
    errEl.classList.add('on')
    badgeConn.classList.remove('on')
  }

  function initThree () {
    const w = canvas.parentElement.clientWidth
    const h = canvas.parentElement.clientHeight
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true })
    renderer.setPixelRatio(window.devicePixelRatio)
    renderer.setSize(w, h)
    renderer.setClearColor(0x0a0a0f)
    renderer.xr.enabled = true       // active le rendu stéréo WebXR
    scene  = new THREE.Scene()
    camera = new THREE.PerspectiveCamera(fov, w / h, 0.1, 2000)
    camera.position.set(0, 0, 0.001)

    videoEl = document.createElement('video')
    videoEl.autoplay = true; videoEl.muted = true; videoEl.playsInline = true

    videoTex = new THREE.VideoTexture(videoEl)
    videoTex.minFilter = THREE.LinearFilter
    videoTex.magFilter = THREE.LinearFilter
    videoTex.format    = THREE.RGBFormat

    const geo = new THREE.SphereGeometry(800, 64, 48)
    geo.scale(-1, 1, 1)
    sphere = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ map: videoTex }))
    scene.add(sphere)

    window.addEventListener('resize', onResize)
    attachControls()
    // setAnimationLoop est nécessaire pour WebXR (synchronisation avec le vsync du casque)
    renderer.setAnimationLoop(renderLoop)
    // Détection du support WebXR pour afficher le bouton
    setupVR()
  }

  function onResize () {
    if (!renderer) return
    const el = canvas.parentElement
    renderer.setSize(el.clientWidth, el.clientHeight)
    camera.aspect = el.clientWidth / el.clientHeight
    camera.updateProjectionMatrix()
  }

  // Lerp angulaire avec wrap 360° (chemin le plus court)
  function lerpAngleDeg (current, target, factor) {
    let delta = target - current
    while (delta > 180)  delta -= 360
    while (delta < -180) delta += 360
    return current + delta * factor
  }

  function renderLoop () {
    if (videoTex) videoTex.needsUpdate = true

    // En mode VR le casque pilote la caméra → on ne touche pas à lookAt/tracking.
    // Hors VR : auto-framing + lookAt manuel comme avant.
    if (!renderer.xr.isPresenting) {
      if (trackingEnabled && hasTarget && !isDragging && performance.now() > userOverrideUntil) {
        lon = lerpAngleDeg(lon, targetLon, LERP_FACTOR)
        lat = lat + (targetLat - lat) * LERP_FACTOR
      }
      lat = Math.max(-85, Math.min(85, lat))
      const phi = THREE.MathUtils.degToRad(90 - lat)
      const theta = THREE.MathUtils.degToRad(lon)
      camera.lookAt(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta))
    }
    renderer.render(scene, camera)
  }

  function attachControls () {
    canvas.addEventListener('mousedown', e => {
      isDragging = true; prevX = e.clientX; prevY = e.clientY
      canvas.classList.add('grabbing')
      userOverrideUntil = performance.now() + OVERRIDE_DURATION_MS
    })
    window.addEventListener('mousemove', e => {
      if (!isDragging) return
      lon -= (e.clientX - prevX) * 0.18
      lat += (e.clientY - prevY) * 0.18
      prevX = e.clientX; prevY = e.clientY
    })
    window.addEventListener('mouseup', () => { isDragging = false; canvas.classList.remove('grabbing') })

    canvas.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return
      isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY
      userOverrideUntil = performance.now() + OVERRIDE_DURATION_MS
    }, { passive: true })
    canvas.addEventListener('touchmove', e => {
      if (!isDragging || e.touches.length !== 1) return
      lon -= (e.touches[0].clientX - prevX) * 0.22
      lat += (e.touches[0].clientY - prevY) * 0.22
      prevX = e.touches[0].clientX; prevY = e.touches[0].clientY
    }, { passive: true })
    canvas.addEventListener('touchend', () => { isDragging = false }, { passive: true })

    canvas.addEventListener('wheel', e => {
      fov += e.deltaY * 0.04
      fov = Math.max(30, Math.min(110, fov))
      fovRange.value = Math.round(fov)
      fovValEl.textContent = Math.round(fov) + '°'
      camera.fov = fov; camera.updateProjectionMatrix()
    }, { passive: true })

    fovRange.addEventListener('input', () => {
      fov = parseInt(fovRange.value)
      fovValEl.textContent = fov + '°'
      camera.fov = fov; camera.updateProjectionMatrix()
    })
    btnCenter.addEventListener('click', () => { lon = 0; lat = 0 })
    btnFs.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen()
      else document.exitFullscreen()
    })
    document.addEventListener('fullscreenchange', () => setTimeout(onResize, 80))

    window.addEventListener('keydown', e => {
      if (e.key === 'c' || e.key === 'C') { lon = 0; lat = 0 }
      if (e.key === 'f' || e.key === 'F') btnFs.click()
    })
  }

  // PeerJS exige un stream local pour call(). On envoie un faux flux VIDÉO
  // (canvas noir) pour que la négociation SDP contienne bien une m-line vidéo
  // → sinon le streamer ne peut pas y attacher sa piste vidéo dans l'answer.
  function makeFakeVideoStream () {
    const fake = document.createElement('canvas')
    fake.width = 16; fake.height = 16
    const fctx = fake.getContext('2d')
    fctx.fillStyle = '#000'
    fctx.fillRect(0, 0, 16, 16)
    // Anime légèrement pour garantir des frames
    setInterval(() => {
      fctx.fillStyle = '#000'
      fctx.fillRect(0, 0, 16, 16)
    }, 1000)
    return fake.captureStream(1)   // 1 fps suffit, c'est juste pour ouvrir la m-line
  }

  function connect (targetId) {
    badgeConn.classList.add('on')
    errEl.classList.remove('on')
    btnJoin.disabled = true
    btnJoin.textContent = 'Connexion…'
    streamReceived = false

    peer = new Peer({
      host: 'hmlssender.com',
      port: 443,
      path: '/peerjs',
      secure: true,
      debug: 2,
      config: { iceServers: ICE_SERVERS }
    })

    peer.on('open', myId => {
      console.log('[viewer] PeerJS open, my id:', myId, '→ appel de', targetId)
      const fakeStream = makeFakeVideoStream()
      call = peer.call(targetId, fakeStream, { config: { iceServers: ICE_SERVERS } })
      if (!call) { showError('Impossible d\'appeler ' + targetId); resetJoin(); return }

      function handleRemoteStream (remoteStream, source) {
        if (streamReceived) return
        console.log('[viewer] stream reçu via', source, remoteStream.getTracks())
        streamReceived = true
        splash.style.display = 'none'
        bottombar.classList.add('on')
        badgeConn.classList.remove('on')
        badgeLive.classList.add('on')
        if (!renderer) initThree()
        videoEl.srcObject = remoteStream
        videoEl.play().catch(err => console.warn('play() failed', err))
      }

      // Debug ICE + ontrack direct (PeerJS oublie parfois de fire 'stream' en flux asymétrique)
      if (call.peerConnection) {
        call.peerConnection.addEventListener('iceconnectionstatechange', () => {
          console.log('[viewer] ICE:', call.peerConnection.iceConnectionState)
        })
        call.peerConnection.addEventListener('track', evt => {
          console.log('[viewer] ontrack:', evt.track.kind, 'streams:', evt.streams.length)
          if (evt.streams && evt.streams[0]) handleRemoteStream(evt.streams[0], 'ontrack')
          else {
            // Construire un MediaStream depuis le track isolé
            handleRemoteStream(new MediaStream([evt.track]), 'ontrack-fallback')
          }
        })
      }

      call.on('stream', remoteStream => handleRemoteStream(remoteStream, 'peerjs-stream'))

      call.on('close', () => {
        badgeLive.classList.remove('on')
        if (streamReceived) showError('Le diffuseur a coupé la connexion.')
        else                showError('Connexion P2P impossible (NAT/firewall, ID invalide, ou diffuseur hors ligne). Ouvre la console F12 pour le détail.')
        resetJoin()
      })

      call.on('error', err => {
        console.error('[viewer] call error', err)
        showError('Erreur appel : ' + (err.message || err.type))
        resetJoin()
      })

      setTimeout(() => {
        if (call && !streamReceived) {
          showError('Aucun flux reçu après 15 s. ID invalide ou réseau bloque WebRTC ?')
          try { call.close() } catch(_) {}
          resetJoin()
        }
      }, 15000)
    })

    peer.on('error', err => {
      console.error('[viewer] peer error', err)
      if (err.type === 'peer-unavailable') showError('ID introuvable : ' + targetId + ' (le diffuseur n\'est pas en ligne ou l\'ID a changé)')
      else showError('Erreur P2P : ' + err.type + ' — ' + (err.message || ''))
      resetJoin()
    })
  }

  function resetJoin () {
    btnJoin.disabled = false
    btnJoin.textContent = 'Rejoindre'
    badgeConn.classList.remove('on')
  }

  btnJoin.addEventListener('click', () => {
    const id = idInput.value.trim()
    if (!id) { showError('Entre un ID de session.'); return }
    connect(id)
  })
  idInput.addEventListener('keydown', e => { if (e.key === 'Enter') btnJoin.click() })

  if (urlId) setTimeout(() => btnJoin.click(), 300)

  // ── Object detector (MediaPipe Tasks Vision) ──────────────────────────────
  // Chargement paresseux : seulement au premier clic "Suivi auto"
  async function loadDetector () {
    if (detector || detectorLoading) return detector
    detectorLoading = true
    btnTrack.classList.add('loading')
    btnTrack.textContent = 'Chargement…'
    try {
      const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs')
      const fileset = await vision.FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
      )
      detector = await vision.ObjectDetector.createFromOptions(fileset, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite',
          delegate: 'GPU'
        },
        scoreThreshold: 0.45,
        maxResults: 5,
        categoryAllowlist: ['person'],
        runningMode: 'VIDEO'
      })
      console.log('[viewer] detector loaded')
    } catch (e) {
      console.error('[viewer] detector load failed:', e)
      detector = null
    } finally {
      detectorLoading = false
      btnTrack.classList.remove('loading')
    }
    return detector
  }

  // Conversion pixel équirectangulaire → angles sphère (lon, lat en degrés)
  // Mapping Three.js SphereGeometry r128 (scale -1,1,1) avec notre convention camera :
  //   lon = u * 360 - 180   (u=0 ↔ ±180°, u=0.5 ↔ 0°)
  //   lat = 90 - v * 180    (v=0 ↔ +90°, v=1 ↔ -90°)
  // Mais notre lon=0 pointe vers +X qui correspond à u=0 du texture → décale de 180°.
  function pixelToSpherical (u, v) {
    let lon = ((u * 360) + 180) % 360 - 180   // wrap dans (-180, 180]
    if (lon === -180) lon = 180
    const lat = 90 - v * 180
    return { lon, lat }
  }

  function updatePersonCountUI (n) {
    trackCount.textContent = n
    trackPlural.style.display = n > 1 ? '' : 'none'
    if (trackingEnabled) badgeTrack.classList.add('on')
  }

  function detectLoop () {
    if (!trackingEnabled) return
    requestAnimationFrame(detectLoop)
    if (!detector || !videoEl || videoEl.readyState < 2 || !videoEl.videoWidth) return

    const now = performance.now()
    if (now - lastDetectTime < DETECT_INTERVAL_MS) return
    lastDetectTime = now

    let result
    try {
      result = detector.detectForVideo(videoEl, now)
    } catch (e) {
      // Erreur ponctuelle, on saute cette frame
      return
    }
    const persons = (result && result.detections) || []
    updatePersonCountUI(persons.length)

    if (persons.length === 0) {
      // Pas de détection → on garde la dernière cible mais on n'update plus
      // (hasTarget reste à sa valeur précédente)
      return
    }

    // Centroïde pondéré par la confiance des détections
    const W = videoEl.videoWidth
    const H = videoEl.videoHeight
    let sumX = 0, sumY = 0, wSum = 0
    for (const d of persons) {
      const bb = d.boundingBox
      const w = (d.categories && d.categories[0]) ? d.categories[0].score : 1
      sumX += (bb.originX + bb.width / 2) * w
      sumY += (bb.originY + bb.height / 2) * w
      wSum += w
    }
    const cx = sumX / wSum
    const cy = sumY / wSum

    const t = pixelToSpherical(cx / W, cy / H)
    targetLon = t.lon
    targetLat = t.lat
    hasTarget = true
  }

  // ── WebXR / Mode VR ────────────────────────────────────────────────────────
  let vrSession = null

  async function setupVR () {
    if (!('xr' in navigator) || !navigator.xr.isSessionSupported) {
      console.log('[viewer] WebXR non supporté par ce navigateur')
      return
    }
    try {
      const supported = await navigator.xr.isSessionSupported('immersive-vr')
      if (!supported) {
        console.log('[viewer] casque VR non détecté ou immersive-vr indispo')
        return
      }
    } catch (e) {
      console.warn('[viewer] check VR support failed', e)
      return
    }
    btnVR.style.display = ''   // affiche le bouton
    console.log('[viewer] WebXR détecté, bouton VR disponible')
  }

  btnVR.addEventListener('click', async () => {
    if (vrSession) {
      // Sortir de VR
      try { await vrSession.end() } catch (_) {}
      return
    }
    try {
      const session = await navigator.xr.requestSession('immersive-vr', {
        optionalFeatures: ['local-floor', 'bounded-floor']
      })
      await renderer.xr.setSession(session)
      vrSession = session
      btnVR.classList.add('active')
      btnVR.title = 'Sortir du mode VR'

      session.addEventListener('end', () => {
        vrSession = null
        btnVR.classList.remove('active')
        btnVR.title = 'Mode VR (casque)'
        // recadrage doux après sortie
        onResize()
      })
      console.log('[viewer] session VR démarrée')
    } catch (e) {
      console.error('[viewer] VR session failed:', e)
      const oldText = btnVR.querySelector('svg') ? null : btnVR.textContent
      btnVR.title = 'VR indisponible : ' + e.message
    }
  })

  // Toggle bouton "Suivi auto"
  btnTrack.addEventListener('click', async () => {
    if (detectorLoading) return
    if (trackingEnabled) {
      // Désactiver
      trackingEnabled = false
      hasTarget = false
      btnTrack.classList.remove('active')
      btnTrack.textContent = 'Suivi auto'
      badgeTrack.classList.remove('on')
      return
    }
    // Activer (lazy load au premier clic)
    if (!detector) {
      await loadDetector()
      if (!detector) {
        btnTrack.textContent = 'Suivi indispo'
        setTimeout(() => { btnTrack.textContent = 'Suivi auto' }, 2500)
        return
      }
    }
    trackingEnabled = true
    btnTrack.classList.add('active')
    btnTrack.textContent = 'Suivi auto ✓'
    badgeTrack.classList.add('on')
    updatePersonCountUI(0)
    detectLoop()
  })
})()
</script>
</body>
</html>
